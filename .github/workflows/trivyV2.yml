---
name: Trivy scan V2
on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Docker Image CI
    types:
      - completed
permissions:
  contents: read
  packages: write
jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      security-events: write
      packages: write
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with:
          length: 6
      - name: Install ORAS
        shell: bash
        run: |
          set -euo pipefail
          ORAS_VERSION="1.2.3"
          curl -fsSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" -o oras.tar.gz
          tar -xzf oras.tar.gz oras
          sudo mv oras /usr/local/bin/oras
          rm -f oras.tar.gz
          oras version
      - name: Authenticate to GHCR
        id: ghcr
        shell: bash
        run: |
          oras login ghcr.io \
            -u ${{ github.actor }} \
            -p ${{ github.token }}
      - name: Pull Trivy DBs from GHCR
        id: pull
        shell: bash
        run: |
          oras pull ghcr.io/leto1210/docker-dnsmasq/trivy-db:2
          oras pull ghcr.io/leto1210/docker-dnsmasq/trivy-java-db:1
      - name: Scan Container Image
        id: scan
        uses: aquasecurity/trivy-action@v0.28.0
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/leto1210/docker-dnsmasq/trivy-db,public.ecr.aws/aquasecurity/trivy-db,ghcr.io/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: ghcr.io/leto1210/docker-dnsmasq/trivy-java-db,public.ecr.aws/aquasecurity/trivy-java-db,ghcr.io/aquasecurity/trivy-java-db
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ github.token }}
        with:
          cache: true
          exit-code: 0
          ignore-unfixed: true
          image-ref: docker.io/leto1210/docker-dnsmasq:${{ steps.short-sha.outputs.sha }}
          format: 'sarif'
          output: 'docker-dnsmasq_trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'docker-dnsmasq_trivy-results.sarif'
